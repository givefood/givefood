name: Setup Copilot Agent
on:
  workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: givefood_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_NAME: givefood_test
      TEST_DB_USER: postgres
      TEST_DB_PASS: postgres
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install PostgreSQL extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d givefood_test -c "CREATE EXTENSION IF NOT EXISTS cube;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d givefood_test -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d givefood_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest
